<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
</head>
<body>

<h2>Enter your details</h2>

<form method="POST" action="/result/">
    {% csrf_token %}

    <label>Name:</label>
    <input type="text" name="name" required><br><br>

    <label>Favorite Color:</label>
    <input type="text" name="color" required><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
